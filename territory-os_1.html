<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoLab Territory OS — Tomi Gbeleyi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{--blue:#1d6fe5;--blueDark:#0f4fb5;--blueSoft:#e8f1fe;--ink:#0f1b2d;--body:#475569;--muted:#7c8aa0;--bg:#f5f8fd;--card:#fff;--line:#e4eaf2}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cdd8e6;border-radius:4px}
  .mono{font-family:'IBM Plex Mono',monospace}
  .nav{display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#ffffffe6;backdrop-filter:blur(12px);z-index:10}
  .brand{font-weight:700;font-size:16px}.brand span{color:var(--blue)}
  .navsub{font-size:11px;color:var(--muted)}
  .toggle{margin-left:auto;display:flex;gap:4px;background:#eef3fa;padding:4px;border-radius:10px;border:1px solid var(--line)}
  .toggle button{background:transparent;color:var(--body);border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .toggle button.on{background:var(--blue);color:#fff}
  .wrap{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 57px)}
  .left{flex:1;padding:26px 28px;min-width:0}
  .right{width:420px;flex-shrink:0;border-left:1px solid var(--line);background:var(--card);padding:26px 24px;position:sticky;top:57px;align-self:flex-start;height:calc(100vh - 57px);overflow-y:auto}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px #0f1b2d08}
  .stat .n{font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 13px;color:var(--ink);font-size:13px;outline:none;font-family:inherit}
  .tierbtn{background:var(--card);color:var(--body);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .tierbtn.on{color:#fff}
  .tier{margin-bottom:26px}
  .tier-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .tier-dot{width:8px;height:8px;border-radius:2px}
  .tier-name{font-size:14px;font-weight:600}.tier-desc{font-size:12px;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .12s;box-shadow:0 1px 3px #0f1b2d08}
  .card.sel{border-color:var(--blue);box-shadow:0 0 0 3px #1d6fe522}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-name{font-size:14px;font-weight:600;line-height:1.25}
  .card-score{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .badge{display:inline-block;margin-top:7px;font-size:9px;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:.05em}
  .card-meta{display:flex;gap:8px;margin-top:9px;font-size:10.5px;color:var(--muted)}
  .d-name{font-size:22px;font-weight:700;margin:0 0 4px}
  .d-meta{font-size:11px;color:var(--muted);margin-bottom:14px}
  .d-box{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .d-label{font-size:11px;color:var(--blueDark);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .scorerow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .scorerow .nm{font-size:11px;color:var(--body);width:92px;flex-shrink:0}
  .bar{height:6px;background:#eef2f8;border-radius:3px;overflow:hidden;flex:1}
  .bar-fill{height:100%;background:var(--blue);border-radius:3px}
  .scorerow .v{font-size:11px;color:var(--ink);width:22px;text-align:right;font-family:'IBM Plex Mono',monospace}
  .reason{font-size:13px;line-height:1.6;color:var(--body);margin:0}
  .pb-step{display:flex;gap:9px;margin-bottom:7px}
  .pb-num{width:18px;height:18px;border-radius:5px;background:var(--blueSoft);border:1px solid #1d6fe544;color:var(--blueDark);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
  .pb-text{font-size:12.5px;line-height:1.5;color:var(--body)}
  .note{margin-top:16px;background:var(--blueSoft);border:1px solid #1d6fe533;border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.55;color:var(--blueDark)}
  .empty{color:var(--muted);text-align:center;margin-top:80px;font-size:13px}
  .method{max-width:760px;margin:0 auto;padding:40px 28px 80px}
  .m-title{font-size:30px;font-weight:700;margin:0 0 6px;letter-spacing:-.02em}
  .m-intro{color:var(--body);font-size:15px;line-height:1.6;margin:0 0 28px}
  .wcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 3px #0f1b2d0a}
  .whead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .whead .wl{font-size:16px;font-weight:600}.whead .wp{font-size:22px;font-weight:700;color:var(--blue);font-family:'IBM Plex Mono',monospace}
  .wbar{height:5px;background:#eef2f8;border-radius:3px;margin-bottom:12px;overflow:hidden}
  .wbar div{height:100%;background:linear-gradient(90deg,var(--blue),#5aa0ff)}
  .wrat{color:var(--body);font-size:13.5px;line-height:1.65;margin:0}
  .msum{background:var(--blueSoft);border:1px solid #1d6fe533;border-radius:14px;padding:18px 20px;margin-top:18px}
  .msum .h{font-size:13px;font-weight:600;color:var(--blueDark);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
  .msum p{margin:0;font-size:14.5px;line-height:1.65;color:var(--ink)}
  h3.plan{margin:16px 0 6px;font-size:13px;color:var(--blueDark);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
</style>
</head>

const WEIGHTS=[{key:"relationship",label:"Relationship",w:30,rationale:"Existing and prior relationships convert faster and cheaper than cold starts. A customer or churned account already knows the product and the pain \u2014 that's the highest-leverage revenue in a cold book."},{key:"icp_fit",label:"ICP Fit",w:25,rationale:"Win rate tracks product-market fit. Large, engineering-led manufacturers with complex mechanical products are exactly where CoLab's design-review pain is sharpest."},{key:"revenue",label:"Revenue Potential",w:20,rationale:"Bigger company, bigger ACV ceiling and bigger expansion runway. Sizes the prize per account."},{key:"expansion",label:"Expansion Surface",w:15,rationale:"Multi-division corporate families give a land-and-expand multiplier \u2014 one entry point can spread to sister divisions via warm internal referral."},{key:"access",label:"Accessibility",w:10,rationale:"A known contact or internal history shortens time-to-first-meeting. Cheap to act on, so it breaks ties rather than dominating."}];
const STATUS={Customer:{c:"#0d8a5f",bg:"#e6f7f0",label:"CUSTOMER \u00b7 EXPAND"},Churned:{c:"#c77a06",bg:"#fdf3e2",label:"CHURNED \u00b7 WIN-BACK"},Prospect:{c:"#1d6fe5",bg:"#e8f1fe",label:"PROSPECT \u00b7 NET-NEW"}};
const TIER={1:{name:"Tier 1 \u2014 Strike First",desc:"Existing relationships. Warmest revenue, fastest path.",c:"#4f46e5"},2:{name:"Tier 2 \u2014 Core Targets",desc:"High ICP fit + scale. The engine of the territory.",c:"#1d6fe5"},3:{name:"Tier 3 \u2014 Develop",desc:"Solid fit, qualify the pain before heavy investment.",c:"#0891b2"},4:{name:"Tier 4 \u2014 Nurture",desc:"Smaller or lower-fit. Light touch until a trigger appears.",c:"#7c8aa0"}};
const state={view:"board",selected:null,q:"",tier:0};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function filtered(){return TERRITORY.filter(a=>(!state.q||a.name.toLowerCase().includes(state.q.toLowerCase()))&&(state.tier===0||a.tier===state.tier));}

function cardHTML(a){const s=STATUS[a.status],t=TIER[a.tier],sel=state.selected&&state.selected.name===a.name;
  return `<div class="card${sel?' sel':''}" data-acct="${esc(a.name)}"><div class="card-top"><span class="card-name">${esc(a.name)}</span><span class="card-score" style="color:${t.c}">${a.priority}</span></div><div class="badge" style="color:${s.c};background:${s.bg};border:1px solid ${s.c}33">${s.label}</div><div class="card-meta"><span>${a.revRange||"\u2014"}</span><span>\u00b7</span><span>${esc(a.state)}</span>${a.family>1?`<span>\u00b7</span><span style="color:#4f46e5">${a.family} divs</span>`:""}</div></div>`;}

function tierListHTML(){const f=filtered();let h="";[1,2,3,4].forEach(t=>{const items=f.filter(a=>a.tier===t);if(!items.length)return;h+=`<div class="tier"><div class="tier-head"><span class="tier-dot" style="background:${TIER[t].c}"></span><span class="tier-name">${TIER[t].name}</span><span class="tier-desc">${TIER[t].desc}</span></div><div class="cards">${items.map(cardHTML).join("")}</div></div>`;});return h||`<div class="empty">No accounts match.</div>`;}

function detailHTML(){const a=state.selected;if(!a)return `<div class="empty">Select an account to see its scoring, reasoning, and playbook.</div>`;
  const scores=WEIGHTS.map(w=>`<div class="scorerow"><span class="nm">${w.label}</span><div class="bar"><div class="bar-fill" style="width:${a.scores[w.key]/5*100}%"></div></div><span class="v">${a.scores[w.key]}</span></div>`).join("");
  const pb=a.playbook.map((s,i)=>`<div class="pb-step"><span class="pb-num">${i+1}</span><span class="pb-text">${esc(s)}</span></div>`).join("");
  return `<h2 class="d-name">${esc(a.name)}</h2><div class="d-meta mono">RANK #${a.rank} \u00b7 SCORE ${a.priority} \u00b7 ${esc(a.subIndustry.toUpperCase())}</div>
  <div class="d-box"><div class="d-label">Score Breakdown</div>${scores}</div>
  <div style="margin-bottom:14px"><div class="d-label">Why This Rank</div><p class="reason">${esc(a.reasoning)}</p></div>
  <div style="margin-bottom:4px"><div class="d-label">Revenue Playbook</div>${pb}</div>
  <div class="note"><strong>Live Slack + Notion research</strong> runs through CoLab's governed agent (pending IT), not this file. This dashboard owns the triage; the agent owns the deep-dive. Nothing here touches company data.</div>`;}

function boardHTML(){const cust=TERRITORY.filter(a=>a.status==="Customer").length,churn=TERRITORY.filter(a=>a.status==="Churned").length,fam=TERRITORY.filter(a=>a.family>1).length,fit=TERRITORY.filter(a=>a.scores.icp_fit>=4.5).length;
  const stats=[["Accounts",TERRITORY.length,"var(--ink)"],["Customers",cust,"#0d8a5f"],["Churned",churn,"#c77a06"],["Multi-division",fam,"#4f46e5"],["Top-fit",fit,"var(--blue)"]].map(([l,v,c])=>`<div class="stat"><div class="n" style="color:${c}">${v}</div><div class="l">${l}</div></div>`).join("");
  const tbtns=[0,1,2,3,4].map(t=>`<button class="tierbtn${state.tier===t?' on':''}" data-tier="${t}" style="${state.tier===t?`background:${t===0?'var(--blue)':TIER[t].c}`:''}">${t===0?"All":"T"+t}</button>`).join("");
  return `<div class="wrap"><div class="left"><div class="stats">${stats}</div><div class="controls"><input class="search" id="search" placeholder="Search accounts\u2026" value="${esc(state.q)}"><div style="display:flex;gap:8px">${tbtns}</div></div><div id="tierlist">${tierListHTML()}</div></div><div class="right" id="detail">${detailHTML()}</div></div>`;}

function methodHTML(){const cards=WEIGHTS.map(w=>`<div class="wcard"><div class="whead"><span class="wl">${w.label}</span><span class="wp">${w.w}%</span></div><div class="wbar"><div style="width:${w.w*2.5}%"></div></div><p class="wrat">${esc(w.rationale)}</p></div>`).join("");
  return `<div class="method"><h1 class="m-title">How I Triage This Territory</h1><p class="m-intro">The book is cold \u2014 28 accounts, effectively zero open pipeline. With finite hours, the question isn't <em>who do I like</em>, it's <em>where does each hour return the most revenue</em>. I score every account on five weighted factors and let the math set the order. Here's the model.</p>${cards}<div class="msum"><div class="h">The one-line version</div><p>Warm relationships first (Polaris expand, Kohler win-back), then the large engineering-led manufacturers where CoLab's fit is sharpest, then develop the rest. Relationship and fit carry 55% of the weight because in a cold book they're what actually move close rates and cycle time.</p></div></div>`;}

function render(){const app=document.getElementById("app");
  app.innerHTML=`<div class="nav"><div class="brand">CoLab <span>Territory OS</span></div><div class="navsub mono">TOMI GBELEYI \u00b7 NA ENTERPRISE</div><div class="toggle"><button class="${state.view==='board'?'on':''}" data-view="board">Triage Board</button><button class="${state.view==='method'?'on':''}" data-view="method">Methodology</button></div></div>`+(state.view==="board"?boardHTML():methodHTML());
  // bind nav
  app.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render();});
  if(state.view==="board"){
    const s=document.getElementById("search");
    if(s)s.oninput=e=>{state.q=e.target.value;document.getElementById("tierlist").innerHTML=tierListHTML();bindCards();};
    app.querySelectorAll("[data-tier]").forEach(b=>b.onclick=()=>{state.tier=+b.dataset.tier;render();});
    bindCards();
  }
}
function bindCards(){document.querySelectorAll("[data-acct]").forEach(c=>c.onclick=()=>{state.selected=TERRITORY.find(a=>a.name===c.dataset.acct);document.getElementById("detail").innerHTML=detailHTML();document.querySelectorAll("[data-acct]").forEach(x=>x.classList.toggle("sel",x.dataset.acct===c.dataset.acct));});}
render();
</script>
