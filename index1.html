  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif}

  .nav{display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#ffffffe6;backdrop-filter:blur(12px);z-index:10}
  .brand{font-weight:700;font-size:16px}.brand span{color:var(--blue)}
  .navsub{font-size:11px;color:var(--muted)}
  .toggle{margin-left:auto;display:flex;gap:4px;background:#eef3fa;padding:4px;border-radius:10px;border:1px solid var(--line)}
  .toggle button{background:transparent;color:var(--body);border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .toggle button.on{background:var(--blue);color:#fff}
  .wrap{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 57px)}
  .left{flex:1;padding:26px 28px;min-width:0}
  .right{width:420px;flex-shrink:0;border-left:1px solid var(--line);background:var(--card);padding:26px 24px;position:sticky;top:57px;align-self:flex-start;height:calc(100vh - 57px);overflow-y:auto}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px #0f1b2d08}
  .stat .n{font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 13px;color:var(--ink);font-size:13px;outline:none;font-family:inherit}
  .tierbtn{background:var(--card);color:var(--body);border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

  .tier-dot{width:8px;height:8px;border-radius:2px}
  .tier-name{font-size:14px;font-weight:600}.tier-desc{font-size:12px;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .12s;box-shadow:0 1px 3px #0f1b2d08;position:relative}
  .card.sel{border-color:var(--blue);box-shadow:0 0 0 3px #1d6fe522}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-name{font-size:14px;font-weight:600;line-height:1.25}
  .card-score{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace}

  .sig{display:inline-block;font-size:8.5px;font-weight:700;border-radius:4px;padding:2px 6px;letter-spacing:.05em;margin-left:6px}
  .card-meta{display:flex;gap:8px;margin-top:9px;font-size:10.5px;color:var(--muted)}
  .d-name{font-size:22px;font-weight:700;margin:0 0 4px}
  .d-meta{font-size:11px;color:var(--muted);margin-bottom:14px}

  .m-intro{color:var(--body);font-size:15px;line-height:1.6;margin:0 0 20px;max-width:720px}

  .bcard-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .bcard-name{font-size:14.5px;font-weight:600}

  const sig=a.signal?SIG[a.signal]:null;
  const intelBlock=a.intelNote?`<div class="intel" style="background:${sig.bg};border-color:${sig.c}44"><div class="il" style="color:${sig.c}">${sig.label} \u00b7 Field Intel</div><p style="color:var(--ink)">${esc(a.intelNote)}</p></div>`:"";
  const adjNote=a.intelAdj?` \u00b7 base ${a.priority} ${a.intelAdj>0?'+':''}${a.intelAdj} intel`:"";
  const scores=WEIGHTS.map(w=>`<div class="scorerow"><span class="nm">${w.label}</span><div class="bar"><div class="bar-fill" style="width:${a.scores[w.key]/5*100}%"></div></div><span class="v">${a.scores[w.key]}</span></div>`).join("");
  const bdr=a.bdrPlay?`<div class="bdrbox"><div class="bl">BDR Play \u00b7 Mohammad${a.week?` \u00b7 Week ${a.week}`:""}</div><p>${esc(a.bdrPlay)}</p></div>`:"";
  const pb=a.playbook.map((s,i)=>`<div class="pb-step"><span class="pb-num">${i+1}</span><span class="pb-text">${esc(s)}</span></div>`).join("");
  return `<h2 class="d-name">${esc(a.name)}</h2><div class="d-meta mono">RANK #${a.rank} \u00b7 SCORE ${a.adjusted}${adjNote} \u00b7 ${esc(a.subIndustry.toUpperCase())}</div>
  ${intelBlock}${bdr}
  <div class="d-box"><div class="d-label">Score Breakdown (baseline)</div>${scores}</div>
  <div style="margin-bottom:14px"><div class="d-label">Why This Rank (baseline)</div><p class="reason">${esc(a.reasoning)}</p></div>
  <div style="margin-bottom:4px"><div class="d-label">AE Revenue Playbook</div>${pb}</div>
  <div class="note"><strong>Live Slack + Notion research</strong> runs through CoLab's governed agent (pending IT), not this file. Nothing here touches company data.</div>`;}

function boardHTML(){const hot=TERRITORY.filter(a=>a.signal==='HOT').length,intel=TERRITORY.filter(a=>a.signal).length,parked=TERRITORY.filter(a=>a.week===0).length,t1=TERRITORY.filter(a=>a.tier===1).length;
  const stats=[["Accounts",TERRITORY.length,"var(--ink)"],["Act Now",hot,"#dc2626"],["Tier 1",t1,"#4f46e5"],["Field Intel",intel,"var(--blue)"],["Parked",parked,"#7c8aa0"]].map(([l,v,c])=>`<div class="stat"><div class="n" style="color:${c}">${v}</div><div class="l">${l}</div></div>`).join("");
  const tbtns=[0,1,2,3,4].map(t=>`<button class="tierbtn${state.tier===t?' on':''}" data-tier="${t}" style="${state.tier===t?`background:${t===0?'var(--blue)':TIER[t].c};color:#fff`:''}">${t===0?"All":"T"+t}</button>`).join("");
  return `<div class="wrap"><div class="left"><div class="stats">${stats}</div><div class="controls"><input class="search" id="search" placeholder="Search accounts\u2026" value="${esc(state.q)}"><div style="display:flex;gap:8px">${tbtns}</div></div><div id="tierlist">${tierListHTML()}</div></div><div class="right" id="detail">${detailHTML()}</div></div>`;}

function bdrHTML(){let h=`<div class="center"><h1 class="m-title">BDR Cadence \u00b7 Mohammad Makableh</h1><p class="m-intro">This is a strategic, account-based motion \u2014 not a volume blast. Mohammad works ~5 accounts a week, research-first: map the engineering org, find the right person, and hand Tomi one sharp, account-specific touch. Quality over quantity. Parked accounts are deliberately off the list until a trigger appears.</p>`;
  for(let w=1;w<=5;w++){const items=TERRITORY.filter(a=>a.week===w);if(!items.length)continue;
    h+=`<div class="weekhead"><span class="weekpill${w===1?' now':''}">${w===1?'THIS WEEK':'WEEK '+w}</span><span class="weekdesc">${WEEKDESC[w]} \u00b7 ${items.length} accounts</span></div>`;
    items.forEach(a=>{const sig=a.signal?SIG[a.signal]:null;
      h+=`<div class="bcard${w===1?' focus':''}"><div class="bcard-top"><span class="bcard-name">${esc(a.name)}</span>${sig?`<span class="sig" style="color:${sig.c};background:${sig.bg};border:1px solid ${sig.c}44">${sig.label}</span>`:""}<span class="mono" style="margin-left:auto;font-size:11px;color:var(--muted)">${a.revRange||""} \u00b7 ${esc(a.state)}</span></div><p>${esc(a.bdrPlay||"")}</p></div>`;});
  }
  const parked=TERRITORY.filter(a=>a.week===0);
  if(parked.length){h+=`<div class="weekhead"><span class="weekpill" style="background:#7c8aa0">PARKED</span><span class="weekdesc">Do not work now \u2014 revisit on trigger</span></div>`;
    parked.forEach(a=>{h+=`<div class="parkrow"><span class="pn">${esc(a.name)}</span><p>${esc(a.intelNote||"")}</p></div>`;});}
  return h+`</div>`;}

function methodHTML(){const cards=WEIGHTS.map(w=>`<div class="wcard"><div class="whead"><span class="wl">${w.label}</span><span class="wp">${w.w}%</span></div><div class="wbar"><div style="width:${w.w*2.5}%"></div></div><p class="wrat">${esc(w.rationale)}</p></div>`).join("");
  return `<div class="center"><h1 class="m-title">How I Triage This Territory</h1><p class="m-intro">The book is cold \u2014 28 accounts, effectively zero open pipeline. With finite hours, the question isn't <em>who do I like</em>, it's <em>where does each hour return the most revenue</em>. I run a two-layer system: a quantitative baseline, then a field-intel overlay.</p>
  <div class="twolayer"><div class="h">Two layers</div><p><strong>Layer 1 \u2014 the model:</strong> every account scored on five weighted factors from firmographic data. Repeatable, unbiased, defensible. <strong>Layer 2 \u2014 field intel:</strong> real signals from reps, calls, and events that adjust the baseline, each with a documented reason. The model sets the order; intel corrects it \u2014 and I keep both visible so any ranking can be explained.</p></div>
  ${cards}<div class="msum"><div class="h">The one-line version</div><p>Score on the data, then correct with what the field actually knows \u2014 and write down why. Triggered accounts jump the line (Crown's live demo); accounts the intel kills drop regardless of paper score (Kohler's churn was another team's, Polaris lost its champion, Snap-On is heads-down on a PLM project, Brandt already said no).</p></div></div>`;}

function render(){const app=document.getElementById("app");
  const tabs=[["board","Triage Board"],["bdr","BDR Cadence"],["method","Methodology"]].map(([k,l])=>`<button class="${state.view===k?'on':''}" data-view="${k}">${l}</button>`).join("");
  const main=state.view==="board"?boardHTML():state.view==="bdr"?bdrHTML():methodHTML();
  app.innerHTML=`<div class="nav"><div class="brand">CoLab <span>Territory OS</span></div><div class="navsub mono">TOMI GBELEYI \u00b7 NA ENTERPRISE</div><div class="toggle">${tabs}</div></div>`+main;
  app.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;render();});
  if(state.view==="board"){const s=document.getElementById("search");if(s)s.oninput=e=>{state.q=e.target.value;document.getElementById("tierlist").innerHTML=tierListHTML();bindCards();};
    app.querySelectorAll("[data-tier]").forEach(b=>b.onclick=()=>{state.tier=+b.dataset.tier;render();});bindCards();}
}
function bindCards(){document.querySelectorAll("[data-acct]").forEach(c=>c.onclick=()=>{state.selected=TERRITORY.find(a=>a.name===c.dataset.acct);document.getElementById("detail").innerHTML=detailHTML();document.querySelectorAll("[data-acct]").forEach(x=>x.classList.toggle("sel",x.dataset.acct===c.dataset.acct));});}
render();

</script>
</body>
</html>
